name: Build and Push Docker Image

on:
  # Trigger on new releases/tags
  release:
    types: [ published ]
  # Allow manual trigger
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

# Prevent overlapping builds (e.g. a release publish + a manual dispatch) from
# racing each other and pushing tags out of order.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKERHUB_REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for GHCR
      id: meta-ghcr
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
        # Disable auto "latest" handling; the explicit raw rule below is the single source of truth.
        flavor: |
          latest=false
        tags: |
          # Version tags derived from the release's git tag (e.g. 2.7.0 and 2.7).
          # Only emitted when a semver tag is present (release events), no-op otherwise.
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          # "latest" on every release publish, and on manual dispatch from the default branch.
          type=raw,value=latest,enable=${{ github.event_name == 'release' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

    - name: Extract metadata for Docker Hub
      id: meta-dockerhub
      uses: docker/metadata-action@v5
      with:
        images: ${{ github.repository }}
        # Disable auto "latest" handling; the explicit raw rule below is the single source of truth.
        flavor: |
          latest=false
        tags: |
          # Version tags derived from the release's git tag (e.g. 2.7.0 and 2.7).
          # Only emitted when a semver tag is present (release events), no-op otherwise.
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          # "latest" on every release publish, and on manual dispatch from the default branch.
          type=raw,value=latest,enable=${{ github.event_name == 'release' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

    - name: Build and push to both registries
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ steps.meta-ghcr.outputs.tags }}
          ${{ steps.meta-dockerhub.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}